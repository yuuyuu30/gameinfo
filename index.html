[object Object]<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゲーム情報</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--s1:#080808;--border:#1c1c1c;--border2:#303030;
  --text:#c8c8c8;--dim:#505050;--dimmer:#282828;--white:#f0f0f0;
  --event:#c8a84b;--bug:#c85050;--campaign:#4bc8a8;--birthday:#9b6bd8;
  --new:#4b9b5b;--port:#4b6b9b;--remaster:#9b7040;--spin:#9b4b6b;
  --dot:#141414;--link:#5b8ec8;--link-h:#7aaee8;
}
[data-theme="light"]{
  --bg:#f8f8f6;--s1:#f0f0ed;--border:#e0e0db;--border2:#c8c8c0;
  --text:#2a2a2a;--dim:#888880;--dimmer:#c8c8c0;--white:#0a0a0a;
  --event:#8b6010;--bug:#a02828;--campaign:#18705a;--birthday:#5b2da0;
  --new:#1a5a28;--port:#1a3a6b;--remaster:#6b4018;--spin:#6b1a3a;
  --dot:#e0e0da;--link:#1a4b8b;--link-h:#0a3070;
}
body{background:var(--bg);color:var(--text);font-family:'Space Mono','Courier New',monospace;font-size:13px;line-height:1.7;transition:background .2s,color .2s}
a{color:inherit;text-decoration:none}

header{background-image:radial-gradient(circle,var(--dot) 1px,transparent 1px);background-size:16px 16px;padding:32px 24px 22px;border-bottom:1px solid var(--border2)}
.h-wrap{max-width:900px;margin:0 auto}
.h-eye{font-size:10px;color:var(--dim);letter-spacing:.5em;text-transform:uppercase;margin-bottom:8px}
.h-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
.h-title{font-size:20px;font-weight:700;color:var(--white);letter-spacing:.02em}
.h-meta{font-size:11px;color:var(--dim);margin-top:8px}
.theme-btn{font-family:inherit;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);background:transparent;border:1px solid var(--border2);padding:5px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.theme-btn:hover{color:var(--white);border-color:var(--text)}

.tab-bar{background:var(--bg);border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:100;transition:background .2s;padding:0 24px;display:flex;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{font-family:inherit;font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--dim);background:transparent;border:none;border-bottom:2px solid transparent;padding:13px 18px 11px;cursor:pointer;white-space:nowrap;margin-bottom:-1px;transition:color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.on{color:var(--white);border-bottom-color:var(--white)}

.panel{display:none}
.panel.on{display:block}
main{max-width:900px;margin:0 auto;padding:0 24px 80px}

.sh{padding:28px 0 20px}
.sh-lbl{font-size:10px;color:var(--dim);letter-spacing:.4em;text-transform:uppercase;margin-bottom:3px}
.sh-ttl{font-size:14px;font-weight:700;color:var(--white);margin-bottom:3px}
.sh-sub{font-size:11px;color:var(--dim)}

/* category blocks */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:4px}
.cat-block{border:1px solid var(--border);padding:16px}
.cat-block:hover{border-color:var(--border2)}
.cat-lbl{font-size:9px;font-weight:700;letter-spacing:.3em;text-transform:uppercase;margin-bottom:12px}
.cat-lbl.ev{color:var(--event)}.cat-lbl.gp{color:var(--campaign)}.cat-lbl.up{color:var(--bug)}.cat-lbl.gd{color:var(--birthday)}
.cat-item{padding:10px 0;border-bottom:1px solid var(--border)}
.cat-item:last-child{border-bottom:none;padding-bottom:0}
.ci-title{font-size:12px;font-weight:700;color:var(--white);margin-bottom:3px}
.ci-desc{font-size:11px;color:var(--dim);line-height:1.7}
.ci-foot{display:flex;align-items:center;gap:12px;margin-top:5px}
.ci-date{font-size:10px;color:var(--event)}
.ci-src{font-size:10px;color:var(--link)}
.ci-src:hover{text-decoration:underline;color:var(--link-h)}
.cat-empty{font-size:11px;color:var(--dimmer);font-style:italic;padding:8px 0}
@media(max-width:620px){.cat-grid{grid-template-columns:1fr}}

.g-hdr{display:grid;grid-template-columns:66px 1fr 200px;gap:16px;padding:0 0 10px;border-bottom:1px solid var(--border2);font-size:9px;letter-spacing:.4em;color:var(--dim);text-transform:uppercase}
.g-list{border-top:1px solid var(--border);margin-top:12px}
.g-row{display:grid;grid-template-columns:66px 1fr 200px;gap:16px;padding:14px 0;border-bottom:1px solid var(--border);align-items:start}
.g-row:hover{background:var(--s1)}
.gd{font-size:12px;font-weight:700;color:var(--white);white-space:nowrap}
.gt{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.gdev{font-size:10px;color:var(--dim);margin-bottom:6px}
.gtags{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.gtag{font-size:9px;letter-spacing:.12em;padding:1px 7px;border:1px solid}
.tn{border-color:var(--new);color:var(--new)}.tp{border-color:var(--port);color:var(--port)}
.tr{border-color:var(--remaster);color:var(--remaster)}.ts{border-color:var(--spin);color:var(--spin)}
.gpf{font-size:10px;color:var(--dimmer)}
.gh{font-size:10px;color:var(--link);display:block;margin-bottom:4px}
.gh:hover{text-decoration:underline;color:var(--link-h)}
.gb{font-size:11px;color:var(--dim);line-height:1.75}
.gsrc{font-size:10px;color:var(--link);display:block;margin-top:6px;letter-spacing:.05em}
.gsrc:hover{text-decoration:underline;color:var(--link-h)}
.gnd{font-size:10px;color:var(--dimmer);font-style:italic}

@media(max-width:620px){
  header{padding:24px 16px 18px}
  .tab-bar{padding:0 12px}
  main{padding:0 16px 60px}
  .sum-row{grid-template-columns:76px 1fr;gap:12px}
  .g-hdr{display:none}
  .g-row{grid-template-columns:56px 1fr;grid-template-rows:auto auto;row-gap:0}
  .g-tw{grid-column:1 / -1;padding-top:10px;margin-top:2px;border-top:1px dashed var(--border2)}
}
</style>
</head>
<body>

<header>
<div class="h-wrap">
  <div class="h-eye">gameinfo · dashboard</div>
  <div class="h-row">
    <div class="h-title">乙女ゲーム 情報</div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">light</button>
  </div>
  <div class="h-meta" id="hMeta">読み込み中...</div>
</div>
</header>

<div class="tab-bar">
  <button class="tab-btn on" onclick="sw(0)">りゅうみこ</button>
  <button class="tab-btn" onclick="sw(1)">乙女新作</button>
</div>

<main>

<div class="panel on" id="p0">
  <div class="sh">
    <div class="sh-lbl">01</div>
    <div class="sh-ttl">りゅうみこ</div>
    <div class="sh-sub">@haruka_ryugu — 遙かなる時空の中で 龍宮の神子</div>
  </div>
  <div class="cat-grid" id="ryuguGrid">
    <div class="cat-block"><div class="cat-lbl ev">活動カレンダー</div><div class="cat-empty">読み込み中...</div></div>
    <div class="cat-block"><div class="cat-lbl gp">カードプール</div><div class="cat-empty">読み込み中...</div></div>
    <div class="cat-block"><div class="cat-lbl up">新着情報</div><div class="cat-empty">読み込み中...</div></div>
    <div class="cat-block"><div class="cat-lbl gd">グッズ情報</div><div class="cat-empty">読み込み中...</div></div>
  </div>
</div>

<div class="panel" id="p1">
  <div class="sh">
    <div class="sh-lbl">02</div>
    <div class="sh-ttl">2026 乙女ゲーム 発売予定</div>
    <div class="sh-sub">出典: <a href="https://w.atwiki.jp/girlgame/pages/507.html" target="_blank" style="color:var(--link)">乙女ゲームまとめ @ ウィキ</a></div>
  </div>
  <div class="g-hdr"><span>発売日</span><span>タイトル</span><span>最新情報</span></div>
  <div class="g-list" id="gList"></div>
</div>

</main>

<script>
const GAMES=[
  {date:"5/28",title:"Starry☆Sky〜Spring Memories〜",platform:"Switch",type:"移植",dev:"arithmetic／dramatic create",handle:null,aurl:null},
  {date:"6/25",title:"Blackish House ←sideZ -Retour-",platform:"Switch",type:"移植",dev:"arithmetic／EDIA",handle:null,aurl:null},
  {date:"7/9",title:"CRAZY CHA!N -エルピスの鎖-",platform:"Switch",type:"新作",dev:"アイディアファクトリー",handle:"@CC_otomate",aurl:"https://x.com/CC_otomate"},
  {date:"7/23",title:"ソラ*ユメ",platform:"Switch",type:"移植",dev:"TAKUYO",handle:null,aurl:null},
  {date:"7/30",title:"君に惑い、君に溺れる。",platform:"Switch",type:"新作",dev:"アイディアファクトリー",handle:"@KK_otomate",aurl:"https://x.com/KK_otomate"},
  {date:"7/30",title:"テニスの王子様 も～っと 学園祭の王子様 ♡",platform:"Switch",type:"リマスター",dev:"コナミ",handle:null,aurl:null},
  {date:"7/30",title:"テニスの王子様 ぎゅ～っと! ドキドキサバイバル Tie break ♡",platform:"Switch",type:"リマスター",dev:"コナミ",handle:null,aurl:null},
  {date:"8/20",title:"あやかしごはん ～おかわりっ!～ for S",platform:"Switch",type:"移植",dev:"arithmetic／EDIA",handle:null,aurl:null},
  {date:"8/27",title:"薄桜鬼異聞 ベレジンスキーの魔女",platform:"Switch",type:"スピンオフ",dev:"アイディアファクトリー",handle:"@WitchB_otomate",aurl:"https://x.com/WitchB_otomate"},
  {date:"9/10",title:"BLACK WOLVES SAGA for Switch",platform:"Switch",type:"移植",dev:"Rejet／アイディアファクトリー",handle:null,aurl:null},
  {date:"9/17",title:"Le Mirage Mystique",platform:"Switch",type:"新作",dev:"ブロッコリー／ティズクリエイション",handle:"@Le_Mirage_jp",aurl:"https://x.com/Le_Mirage_jp"},
  {date:"10/1",title:"Sullyland Nursery Rhyme",platform:"Switch",type:"新作",dev:"アイディアファクトリー",handle:"@SN_otomate",aurl:"https://x.com/SN_otomate"},
  {date:"未定",title:"夕刻の町のグロブスター",platform:"Switch",type:"新作",dev:"TAKUYO",handle:"@takuyo_jolly",aurl:"https://x.com/takuyo_jolly"},
  {date:"未定",title:"百目ノ花贄",platform:"Switch",type:"新作",dev:"神海処／リベロエンジニア",handle:null,aurl:null},
  {date:"未定",title:"ALICE=ALICE ＆ BAD MEDICINE 2in1",platform:"Switch/Switch2",type:"移植",dev:"Rejet",handle:null,aurl:null},
  {date:"未定",title:"MIX DUNK -KING OF BASKETBALL-",platform:"Switch",type:"新作",dev:"VISUALNOTES.／アイディアファクトリー",handle:null,aurl:null},
  {date:"未定",title:"明治東亰恋伽 トワヰライト・キス",platform:"Switch",type:"移植",dev:"dramatic create",handle:null,aurl:null},
];

const tc={新作:'tn',移植:'tp',リマスター:'tr',スピンオフ:'ts'};

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const CATS=[
  {key:'activeEvents',lbl:'活動カレンダー',cls:'ev'},
  {key:'gachaPool',lbl:'カードプール',cls:'gp'},
  {key:'updates',lbl:'新着情報',cls:'up'},
  {key:'goods',lbl:'グッズ情報',cls:'gd'}
];

function renderRyugu(ryugu){
  const grid=document.getElementById('ryuguGrid');
  grid.innerHTML=CATS.map(c=>{
    const items=(ryugu&&ryugu[c.key])||[];
    const body=items.length
      ?items.map(it=>`<div class="cat-item">
  <div class="ci-title">${esc(it.title||'')}</div>
  <div class="ci-desc">${esc(it.desc||'')}</div>
  <div class="ci-foot">${it.date?`<span class="ci-date">${esc(it.date)}</span>`:''
  }${it.url?`<a class="ci-src" href="${esc(it.url)}" target="_blank" rel="noopener">→ ソース</a>`:''}</div>
</div>`).join('')
      :`<div class="cat-empty">情報なし</div>`;
    return `<div class="cat-block"><div class="cat-lbl ${c.cls}">${c.lbl}</div>${body}</div>`;
  }).join('');
}

function renderGames(gd){
  const gl=document.getElementById('gList');
  gl.innerHTML='';
  GAMES.forEach(g=>{
    const d=g.handle&&gd&&gd[g.handle];
    const tw=d
      ?`<a class="gh" href="${esc(g.aurl)}" target="_blank" rel="noopener">${esc(g.handle)}</a><div class="gb">${esc(d.latestText)}</div><a class="gsrc" href="${esc(d.url)}" target="_blank" rel="noopener">→ ソースを見る</a>`
      :g.handle
      ?`<a class="gh" href="${esc(g.aurl)}" target="_blank" rel="noopener">${esc(g.handle)}</a><span class="gnd">更新中...</span>`
      :`<span class="gnd">調査中</span>`;
    gl.innerHTML+=`<div class="g-row"><div class="gd">${esc(g.date)}</div><div><div class="gt">${esc(g.title)}</div><div class="gdev">${esc(g.dev)}</div><div class="gtags"><span class="gtag ${tc[g.type]||'tn'}">${esc(g.type)}</span><span class="gpf">${esc(g.platform)}</span></div></div><div class="g-tw">${tw}</div></div>`;
  });
}

function sw(i){
  document.querySelectorAll('.tab-btn').forEach((b,j)=>b.classList.toggle('on',j===i));
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('on',j===i));
}

function toggleTheme(){
  const h=document.documentElement,b=document.getElementById('themeBtn');
  if(h.getAttribute('data-theme')==='light'){h.removeAttribute('data-theme');b.textContent='light';localStorage.setItem('t','d');}
  else{h.setAttribute('data-theme','light');b.textContent='dark';localStorage.setItem('t','l');}
}
if(localStorage.getItem('t')==='l'){document.documentElement.setAttribute('data-theme','light');document.getElementById('themeBtn').textContent='dark';}

function fmtDate(iso){
  try{const d=new Date(iso);return d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0')+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
  catch(e){return iso||'——';}
}

// Initial render (empty twitter data)
renderGames(null);

// Load data.json
fetch('./data.json?_='+Date.now())
  .then(r=>r.ok?r.json():null)
  .then(data=>{
    if(!data){
      renderRyugu({});
      document.getElementById('hMeta').textContent='データ取得中...';
      return;
    }
    renderRyugu(data.ryugu || {});
    renderGames(data.games);
    document.getElementById('hMeta').textContent='最終更新 '+fmtDate(data.updated);
  })
  .catch(()=>{
    renderRyugu({});
    document.getElementById('hMeta').textContent='——';
  });
</script>
</body>
